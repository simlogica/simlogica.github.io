site_name: SimLogica

site_url: https://simlogica.github.io

theme:
  name: material
  palette:
    # Dark Mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Dark mode
      primary: yellow
      accent: deep orange

    # Light Mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Light mode
      primary: yellow
      accent: deep orange
  font:
    text: Roboto
    code: Red Hat Mono
  icon:
    logo: fontawesome/solid/s
  features:
    - navigation.footer

copyright: Copyright &copy; 2026 SimLogica.com

markdown_extensions:
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - admonition

plugins:
  - search
  # Redirect URLS
  - redirects:
      redirect_maps:
        "r-blocker-android.md": "index.md" # Android App redirect URL
